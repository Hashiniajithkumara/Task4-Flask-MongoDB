<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Submission Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-custom {
            background-color: #4e73df;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4" style="width: 500px;">

        <h3 class="text-center mb-4 text-primary">Task Submission</h3>

        <form id="taskForm">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" id="title" class="form-control" placeholder="Enter task title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Task Description</label>
                <textarea id="description" class="form-control" rows="3" placeholder="Enter task description" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Due Date</label>
                <input type="date" id="dueDate" class="form-control" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom">Submit Task</button>
            </div>

        </form>

        <div class="mt-3 text-center">
            <p id="responseMsg" class="fw-bold"></p>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
